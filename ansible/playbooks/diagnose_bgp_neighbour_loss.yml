---
- name: Diagnose BGP Neighbour Loss
  hosts: localhost
  gather_facts: no
  vars:
    output_dir: /tmp/ansible_results
    lost_neighbor: "{{ alert_neighbor | default('') }}"
    target: "{{ (target_host | default('router1')) | regex_replace('^clab-marr-lab-', '') }}"
    container: "clab-marr-lab-{{ target }}"

  tasks:
    - name: Create output directory
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Collect BGP summary
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip bgp summary"
      register: bgp_summary
      ignore_errors: yes

    - name: Collect BGP neighbour detail
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip bgp neighbors"
      register: bgp_neighbors
      ignore_errors: yes

    - name: Collect OSPF neighbours
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip ospf neighbor"
      register: ospf_neighbors
      ignore_errors: yes

    - name: Collect routing table
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip route"
      register: route_table
      ignore_errors: yes

    - name: Save diagnostic results to JSON
      copy:
        content: |
          {
            "playbook": "diagnose_bgp_neighbour_loss",
            "host": "{{ target }}",
            "container": "{{ container }}",
            "lost_neighbor": "{{ lost_neighbor }}",
            "bgp_summary": {{ bgp_summary.stdout | default('') | to_json }},
            "bgp_neighbors": {{ bgp_neighbors.stdout | default('') | to_json }},
            "ospf_neighbors": {{ ospf_neighbors.stdout | default('') | to_json }},
            "route_table": {{ route_table.stdout | default('') | to_json }}
          }
        dest: "{{ output_dir }}/{{ target }}_bgp_loss.json"
