---
- name: Link-Down Diagnostic
  hosts: localhost
  gather_facts: false
  vars:
    report_dir: /home/cyber/Solent_Final_Lab/reports
    fault: "{{ fault | default('link-down') }}"
    target: "{{ target | default('unknown') }}"
    routers:
      - clab-marr-lab-router1
      - clab-marr-lab-router2
      - clab-marr-lab-router3

  tasks:
    - name: Get interface status from all routers
      command: docker exec {{ item }} vtysh -c "show interface brief"
      register: iface_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get BGP summary from all routers
      command: docker exec {{ item }} vtysh -c "show bgp summary"
      register: bgp_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get IP routes from all routers
      command: docker exec {{ item }} vtysh -c "show ip route"
      register: route_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get interface counters from all routers
      command: docker exec {{ item }} vtysh -c "show interface counters"
      register: counters_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Save diagnostic results to JSON
      copy:
        content: "{{ {
          'playbook': 'diagnose-link-down',
          'fault': fault,
          'target': target,
          'interfaces': iface_out.results | map(attribute='stdout') | list,
          'bgp_summary': bgp_out.results | map(attribute='stdout') | list,
          'routes': route_out.results | map(attribute='stdout') | list,
          'counters': counters_out.results | map(attribute='stdout') | list
          } | to_nice_json }}"
        dest: "{{ report_dir }}/diag-link-down-{{ lookup('pipe', 'date +%s') }}.json"
