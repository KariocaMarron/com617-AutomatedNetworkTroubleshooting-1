---
- name: Diagnose High CPU Event
  hosts: localhost
  gather_facts: no
  vars:
    output_dir: /tmp/ansible_results
    target: "{{ target_host | default('router1') }}"
    container: "clab-com617-marr-lab-{{ target }}"

  tasks:
    - name: Create output directory
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Collect FRR version
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show version"
      register: frr_version
      ignore_errors: yes

    - name: Collect BGP summary
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip bgp summary"
      register: bgp_summary
      ignore_errors: yes

    - name: Collect OSPF neighbours
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show ip ospf neighbor"
      register: ospf_neighbors
      ignore_errors: yes

    - name: Collect memory usage
      community.docker.docker_container_exec:
        container: "{{ container }}"
        command: vtysh -c "show memory"
      register: memory_info
      ignore_errors: yes

    - name: Save diagnostic results to JSON
      copy:
        content: |
          {
            "playbook": "diagnose_high_cpu",
            "host": "{{ target }}",
            "container": "{{ container }}",
            "frr_version": {{ frr_version.stdout | default('') | to_json }},
            "bgp_summary": {{ bgp_summary.stdout | default('') | to_json }},
            "ospf_neighbors": {{ ospf_neighbors.stdout | default('') | to_json }},
            "memory_info": {{ memory_info.stdout | default('') | to_json }}
          }
        dest: "{{ output_dir }}/{{ target }}_high_cpu.json"
