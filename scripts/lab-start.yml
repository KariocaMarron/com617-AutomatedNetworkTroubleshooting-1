---
# COM617 MARR Lab — Start Playbook
# Usage: ansible-playbook scripts/lab-start.yml
# Run from repo root: ~/com617-AutomatedNetworkTroubleshooting-1/

- name: COM617 MARR Lab — Start All Services
  hosts: localhost
  gather_facts: yes
  vars:
    repo_root: "{{ playbook_dir }}/.."
    topology_file: "{{ playbook_dir }}/../containerlab/topology.yml"
    receiver_log: "/tmp/marr_receiver.log"
    receiver_port: 5000

  tasks:

    # PRE-FLIGHT CHECKS
    - name: "PRE-FLIGHT | Check docker-compose.yml exists"
      stat:
        path: "{{ repo_root }}/docker-compose.yml"
      register: compose_check
      failed_when: not compose_check.stat.exists

    - name: "PRE-FLIGHT | Check topology.yml exists"
      stat:
        path: "{{ topology_file }}"
      register: topo_check
      failed_when: not topo_check.stat.exists

    - name: "PRE-FLIGHT | Check .env file exists"
      stat:
        path: "{{ repo_root }}/.env"
      register: env_check

    - name: "PRE-FLIGHT | Warn if .env is missing"
      debug:
        msg: "WARNING — .env not found. Copy .env.example to .env and set MATTERMOST_WEBHOOK_URL."
      when: not env_check.stat.exists

    - name: "PRE-FLIGHT | Check Docker is running"
      command: docker info
      register: docker_check
      failed_when: docker_check.rc != 0
      changed_when: false

    - name: "PRE-FLIGHT | Check Containerlab is installed"
      command: containerlab version
      register: clab_check
      failed_when: clab_check.rc != 0
      changed_when: false

    # STEP 1 — Docker Compose
    - name: "STEP 1/4 | Start Mattermost and PostgreSQL"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}"
        state: present
      become: no

    - name: "STEP 1/4 | Wait for Mattermost to become healthy"
      community.docker.docker_container_info:
        name: marr-mattermost
      register: mm_info
      until: mm_info.container.State.Health.Status == "healthy"
      retries: 12
      delay: 10
      ignore_errors: yes

    - name: "STEP 1/4 | Mattermost status"
      debug:
        msg: "Mattermost is {{ mm_info.container.State.Health.Status | default('unknown') }} — http://localhost:8065"

    # STEP 2 — Containerlab
    - name: "STEP 2/4 | Check if Containerlab is already running"
      command: sudo containerlab inspect --topo {{ topology_file }} --format json
      register: clab_inspect
      ignore_errors: yes
      changed_when: false

    - name: "STEP 2/4 | Deploy Containerlab topology"
      command: sudo containerlab deploy --topo {{ topology_file }}
      args:
        chdir: "{{ repo_root }}"
      register: clab_deploy
      when: clab_inspect.rc != 0 or 'running' not in clab_inspect.stdout

    - name: "STEP 2/4 | Wait for FRR daemons to initialise"
      pause:
        seconds: 10
        prompt: "Waiting 10 seconds for FRR daemons..."
      when: clab_deploy.changed | default(false)

    - name: "STEP 2/4 | Verify OSPF on router1"
      command: sudo docker exec clab-com617-marr-lab-router1 vtysh -c "show ip ospf neighbor"
      register: ospf_check
      ignore_errors: yes
      changed_when: false

    - name: "STEP 2/4 | Containerlab status"
      debug:
        msg: "Containerlab deployed — OSPF: {{ 'converged' if 'Full' in ospf_check.stdout else 'converging (normal for first 30s)' }}"

    # STEP 3 — Python receiver
    - name: "STEP 3/4 | Stop any stale receiver"
      command: pkill -f alert_receiver.py
      ignore_errors: yes
      changed_when: false

    - name: "STEP 3/4 | Start Python alert receiver"
      shell: >
        cd {{ repo_root }}/python &&
        nohup python3 alert_receiver.py > {{ receiver_log }} 2>&1 &
      args:
        executable: /bin/bash

    - name: "STEP 3/4 | Wait for receiver to start"
      pause:
        seconds: 3

    # STEP 4 — Health check
    - name: "STEP 4/4 | Health check — Python receiver"
      uri:
        url: "http://localhost:{{ receiver_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 2
      until: health_check.status == 200

    - name: "STEP 4/4 | Receiver health response"
      debug:
        msg: "{{ health_check.json }}"

    # SUMMARY
    - name: "SUMMARY | Lab started"
      debug:
        msg:
          - "=========================================="
          - "  COM617 MARR Lab is RUNNING"
          - "=========================================="
          - "  Mattermost  : http://localhost:8065"
          - "  Receiver    : http://localhost:{{ receiver_port }}/health"
          - "  Log         : tail -f {{ receiver_log }}"
          - "  Router1     : 172.20.0.11"
          - "  Router2     : 172.20.0.12"
          - "  Router3     : 172.20.0.13"
          - "------------------------------------------"
          - "  Test alert  :"
          - "  curl -s -X POST http://localhost:5000/alert"
          - "    -H 'Content-Type: application/json'"
          - "    -d '{"id":"T01","nodeLabel":"router1","
          - "         "severity":"CRITICAL","
          - "         "uei":"uei.opennms.org/generic/traps/SNMP_Link_Down","
          - "         "description":"Test","ifDescr":"eth1"}'"
          - "=========================================="

