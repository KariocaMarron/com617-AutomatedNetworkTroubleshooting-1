---
# COM617 MARR Lab — Start Playbook
# Usage:    ansible-playbook scripts/lab-start.yml
# Wipe run: ansible-playbook scripts/lab-start.yml --extra-vars "wipe_data=true"
# Run from repo root: ~/Solent_Final_Lab/
# Author: Jose Batalha De Vasconcelos - COM617 Group 15

- name: COM617 MARR Lab - Start All Services
  hosts: localhost
  gather_facts: yes
  vars:
    repo_root: "{{ playbook_dir }}/.."
    topology_file: "{{ playbook_dir }}/../containerlab/lab-topology.yml"
    receiver_port: 5000
    mattermost_port: 8065
    prometheus_port: 9090
    grafana_port: 3000
    vault_port: 8200
    kafka_port: 9092
    snmp_container: clab-marr-lab-snmp-notifier

  tasks:

    # PRE-FLIGHT CHECKS
    - name: "PRE-FLIGHT | Check docker-compose.yml exists"
      stat:
        path: "{{ repo_root }}/docker-compose.yml"
      register: compose_check
      failed_when: not compose_check.stat.exists

    - name: "PRE-FLIGHT | Check topology file exists"
      stat:
        path: "{{ topology_file }}"
      register: topo_check
      failed_when: not topo_check.stat.exists

    - name: "PRE-FLIGHT | Check .env file exists"
      stat:
        path: "{{ repo_root }}/.env"
      register: env_check

    - name: "PRE-FLIGHT | Warn if .env is missing"
      debug:
        msg: "WARNING - .env not found. Copy .env.example to .env and configure all variables before starting."
      when: not env_check.stat.exists

    - name: "PRE-FLIGHT | Check Docker is running"
      command: docker info
      register: docker_check
      failed_when: docker_check.rc != 0
      changed_when: false

    - name: "PRE-FLIGHT | Check Containerlab is installed"
      command: containerlab version
      register: clab_check
      failed_when: clab_check.rc != 0
      changed_when: false

    - name: "PRE-FLIGHT | Scan ports in use"
      shell: ss -ulnp | grep -E ':162 |:514 |:9162 |:5141 ' || true
      register: port_scan
      changed_when: false

    - name: "PRE-FLIGHT | Port scan results"
      debug:
        msg: "Ports in use: {{ port_scan.stdout_lines | default(['none detected']) }}"

    # PRE-FLIGHT - Create Docker networks if missing
    - name: "PRE-FLIGHT | Create marr-net network if missing"
      command: docker network create --driver bridge --subnet 172.21.0.0/16 marr-net
      ignore_errors: yes
      changed_when: false

    - name: "PRE-FLIGHT | Create marr-mgmt network if missing"
      command: docker network create --driver bridge --subnet 172.20.0.0/24 marr-mgmt
      ignore_errors: yes
      changed_when: false

    # STEP 1 - Docker Compose
    - name: "STEP 1/8 | Start all Docker Compose services"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}"
        state: present
      become: no

    - name: "STEP 1/8 | Start Mattermost stack"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}/mattermost"
        state: present
      become: no

    - name: "STEP 1/8 | Wait for Mattermost to become healthy"
      community.docker.docker_container_info:
        name: marr-mattermost
      register: mm_info
      until: mm_info.container.State.Health.Status == "healthy"
      retries: 24
      delay: 15
      ignore_errors: yes

    - name: "STEP 1/8 | Wait for Kafka to be ready"
      command: docker exec marr-kafka kafka-topics --bootstrap-server localhost:9092 --list
      register: kafka_check
      retries: 10
      delay: 5
      until: kafka_check.rc == 0
      ignore_errors: yes
      changed_when: false

    - name: "STEP 1/8 | Ensure Kafka topics exist"
      command: >
        docker exec marr-kafka kafka-topics --bootstrap-server localhost:9092
        --create --if-not-exists --topic {{ item }} --partitions 1 --replication-factor 1
      loop:
        - raw.alerts
        - snmp.traps
        - syslog.events
      ignore_errors: yes

    - name: "STEP 1/8 | Docker Compose status"
      debug:
        msg:
          - "Mattermost : {{ mm_info.container.State.Health.Status | default('unknown') }} - http://localhost:{{ mattermost_port }}"
          - "Prometheus : http://localhost:{{ prometheus_port }}"
          - "Grafana    : http://localhost:{{ grafana_port }}"
          - "Vault      : http://localhost:{{ vault_port }}"
          - "Kafka      : localhost:{{ kafka_port }}"
          - "Redis      : localhost:6380"

    # STEP 2 - OpenNMS Stack
    - name: "STEP 2/8 | Start OpenNMS stack (PostgreSQL, ActiveMQ, Horizon)"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}/opennms/horizon"
        state: present
      become: no

    - name: "STEP 2/8 | Wait for OpenNMS PostgreSQL to be healthy"
      community.docker.docker_container_info:
        name: marr-postgres
      register: pg_info
      until: pg_info.container.State.Health.Status == "healthy"
      retries: 6
      delay: 10
      ignore_errors: yes

    - name: "STEP 2/8 | Wait for OpenNMS Horizon to become healthy"
      community.docker.docker_container_info:
        name: marr-horizon
      register: horizon_info
      until: horizon_info.container.State.Health.Status == "healthy"
      retries: 30
      delay: 20
      ignore_errors: yes

    - name: "STEP 2/8 | OpenNMS status"
      debug:
        msg: "OpenNMS Horizon: {{ horizon_info.container.State.Health.Status | default('unknown') }} - http://localhost:8980/opennms"



    # STEP 3 - Containerlab
    - name: "STEP 3/8 | Check if Containerlab is already running"
      command: sudo containerlab inspect --topo {{ topology_file }} --format json
      register: clab_inspect
      ignore_errors: yes
      changed_when: false

    - name: "STEP 3/8 | Deploy Containerlab topology"
      command: sudo containerlab deploy --topo {{ topology_file }}
      args:
        chdir: "{{ repo_root }}"
      register: clab_deploy
      when: clab_inspect.rc != 0 or 'running' not in clab_inspect.stdout

    - name: "STEP 3/8 | Wait for FRR daemons to initialise"
      pause:
        seconds: 35
        prompt: "Waiting for FRR daemons and OSPF to initialise..."
      when: clab_deploy.changed | default(false)

    - name: "STEP 3/8 | Verify OSPF on router1"
      command: sudo docker exec clab-marr-lab-router1 vtysh -c "show ip ospf neighbor"
      register: ospf_check
      ignore_errors: yes
      changed_when: false

    - name: "STEP 3/8 | Containerlab status"
      debug:
        msg: "Containerlab - OSPF: {{ 'converged' if 'Full' in ospf_check.stdout else 'converging (normal for first 30s)' }}"

    # STEP 4 - SNMP listener inside snmp-notifier container
    - name: "STEP 4/8 | Check if SNMP listener is running in container"
      command: docker exec {{ snmp_container }} pgrep -f snmp_listener.py
      register: snmp_pid
      ignore_errors: yes
      changed_when: false

    - name: "STEP 4/8 | Install pysnmp in snmp-notifier if missing"
      command: docker exec {{ snmp_container }} pip3 install pysnmp requests
      when: snmp_pid.rc != 0
      ignore_errors: yes

    - name: "STEP 4/8 | Copy snmp_listener.py into container"
      command: docker cp {{ repo_root }}/python/snmp_listener.py {{ snmp_container }}:/opt/snmp_listener.py
      when: snmp_pid.rc != 0

    - name: "STEP 4/8 | Start SNMP listener inside container"
      command: >
        docker exec -d {{ snmp_container }}
        sh -c 'python3 /opt/snmp_listener.py > /tmp/snmp.log 2>&1'
      when: snmp_pid.rc != 0

    - name: "STEP 4/8 | SNMP listener status"
      debug:
        msg: "SNMP listener on UDP 162 inside {{ snmp_container }} - {{ 'already running' if snmp_pid.rc == 0 else 'started' }}"

    # STEP 5 - Systemd services
    - name: "STEP 5/8 | Start marr-receiver systemd service"
      systemd:
        name: marr-receiver
        state: started
        enabled: yes
      become: yes

    - name: "STEP 5/8 | Start marr-syslog systemd service"
      systemd:
        name: marr-syslog
        state: started
        enabled: yes
      become: yes

    - name: "STEP 5/8 | Start marr-snmp systemd service"
      systemd:
        name: marr-snmp
        state: started
        enabled: yes
      become: yes


    # STEP 6 - Start Minions
    - name: "STEP 6/8 | Start Hamhung minion"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}/opennms/minions/hamhung"
        state: present
      become: no
      ignore_errors: yes

    - name: "STEP 6/8 | Start Chongjin minion"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}/opennms/minions/chongjin"
        state: present
      become: no
      ignore_errors: yes

    - name: "STEP 6/8 | Wait for minions to register with Horizon"
      uri:
        url: "http://localhost:8980/opennms/rest/minions"
        method: GET
        user: admin
        password: admin
        force_basic_auth: yes
        status_code: 200
        return_content: yes
      register: minion_check
      until: minion_check.content is search('totalCount="2"')
      retries: 18
      delay: 20
      ignore_errors: yes

    - name: "STEP 6/8 | Minion status"
      debug:
        msg: "{{ minion_check.content }}"

    # STEP 7 - Health checks
    - name: "STEP 7/8 | Health check - Alert receiver"
      uri:
        url: "http://localhost:{{ receiver_port }}/health"
        method: GET
        status_code: 200
      register: receiver_health
      retries: 5
      delay: 2
      until: receiver_health.status == 200

    - name: "STEP 7/8 | Health check - Prometheus"
      uri:
        url: "http://localhost:{{ prometheus_port }}/-/healthy"
        method: GET
        status_code: 200
      register: prometheus_health
      ignore_errors: yes

    - name: "STEP 7/8 | Health check - Grafana"
      uri:
        url: "http://localhost:{{ grafana_port }}/api/health"
        method: GET
        status_code: 200
      register: grafana_health
      ignore_errors: yes

    - name: "STEP 7/8 | Health check - Vault"
      uri:
        url: "http://localhost:{{ vault_port }}/v1/sys/health"
        method: GET
        status_code: 200
      register: vault_health
      ignore_errors: yes

    # STEP 8 - Port inventory
    - name: "STEP 8/8 | Final port inventory"
      shell: >
        echo "TCP:" && ss -tlnp | grep -E ':5000|:8065|:8980|:9090|:3000|:8200|:9092|:6380' || true &&
        echo "UDP:" && ss -ulnp | grep -E ':162 |:514 ' || true
      register: port_inventory
      changed_when: false

    - name: "STEP 8/8 | Port inventory results"
      debug:
        msg: "{{ port_inventory.stdout_lines }}"

    # SUMMARY
    - name: "SUMMARY | Lab started"
      debug:
        msg:
          - "=========================================="
          - "  COM617 MARR Lab is RUNNING"
          - "=========================================="
          - "  Alert receiver : http://localhost:5000/health"
          - "  Mattermost     : http://localhost:8065"
          - "  Prometheus     : http://localhost:9090"
          - "  Grafana        : http://localhost:3000"
          - "  Vault          : http://localhost:8200"
          - "  OpenNMS        : http://localhost:8980/opennms"
          - "  Kafka          : localhost:9092"
          - "  Redis          : localhost:6380"
          - "  SNMP listener  : UDP 162 inside snmp-notifier container"
          - "  Syslog listener: UDP 514 via systemd marr-syslog"
          - "  Router1        : 172.21.0.101"
          - "  Router2        : 172.21.0.102"
          - "  Router3        : 172.21.0.103"
          - "------------------------------------------"
          - "  Test alert:"
          - "  curl -s -X POST http://localhost:5000/alert"
          - "  -H Content-Type:application/json"
          - "  -d {id:T01,nodeLabel:router1,severity:CRITICAL}"
          - "=========================================="

# Author: Jose Batalha De Vasconcelos - COM617 Group 15
