---
# COM617 MARR Lab — Stop Playbook
# Usage: ansible-playbook scripts/lab-stop.yml
# Full wipe: ansible-playbook scripts/lab-stop.yml --extra-vars "wipe_data=true"
# Run from repo root: ~/com617-AutomatedNetworkTroubleshooting-1/

- name: COM617 MARR Lab — Stop All Services
  hosts: localhost
  gather_facts: no
  vars:
    repo_root: "{{ playbook_dir }}/.."
    topology_file: "{{ playbook_dir }}/../containerlab/topology.yml"
    receiver_log: "/tmp/marr_receiver.log"
    wipe_data: false

  tasks:

    - name: "STOP | Banner"
      debug:
        msg:
          - "=========================================="
          - "  COM617 MARR Lab — Stopping all services"
          - "=========================================="

    # STEP 1 — Stop Python receiver
    - name: "STEP 1/3 | Check if receiver is running"
      command: pgrep -f alert_receiver.py
      register: receiver_pid
      ignore_errors: yes
      changed_when: false

    - name: "STEP 1/3 | Stop Python alert receiver"
      command: pkill -f alert_receiver.py
      when: receiver_pid.rc == 0
      ignore_errors: yes

    - name: "STEP 1/3 | Archive receiver log"
      copy:
        src: "{{ receiver_log }}"
        dest: "{{ receiver_log }}.bak"
        remote_src: yes
      ignore_errors: yes

    - name: "STEP 1/3 | Receiver status"
      debug:
        msg: "{{ 'Python receiver stopped.' if receiver_pid.rc == 0 else 'Receiver was not running.' }}"

    # STEP 2 — Destroy Containerlab
    - name: "STEP 2/3 | Check if Containerlab is running"
      command: sudo containerlab inspect --topo {{ topology_file }} --format json
      register: clab_inspect
      ignore_errors: yes
      changed_when: false

    - name: "STEP 2/3 | Destroy Containerlab topology"
      command: sudo containerlab destroy --topo {{ topology_file }}
      args:
        chdir: "{{ repo_root }}"
      when: clab_inspect.rc == 0
      ignore_errors: yes

    - name: "STEP 2/3 | Remove Containerlab generated directory"
      file:
        path: "{{ repo_root }}/containerlab/clab-com617-marr-lab"
        state: absent
      ignore_errors: yes

    - name: "STEP 2/3 | Containerlab status"
      debug:
        msg: "{{ 'Containerlab destroyed.' if clab_inspect.rc == 0 else 'Containerlab was not running.' }}"

    # STEP 3 — Docker Compose
    - name: "STEP 3/3 | Stop Mattermost and PostgreSQL"
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}"
        state: absent
        remove_volumes: "{{ wipe_data | bool }}"
      become: no
      ignore_errors: yes

    - name: "STEP 3/3 | Docker Compose status"
      debug:
        msg: "Mattermost and PostgreSQL stopped{{ ' — volumes REMOVED' if wipe_data | bool else ' — data preserved' }}"

    # VERIFY
    - name: "VERIFY | Check for remaining containers"
      command: docker ps --filter "name=marr" --filter "name=clab-com617" --format "{{ '{{' }}.Names{{ '}}' }}"
      register: remaining
      changed_when: false
      ignore_errors: yes

    - name: "VERIFY | Warn if containers still running"
      debug:
        msg: "WARNING — still running: {{ remaining.stdout_lines }}"
      when: remaining.stdout_lines | length > 0

    # SUMMARY
    - name: "SUMMARY | Lab stopped"
      debug:
        msg:
          - "=========================================="
          - "  COM617 MARR Lab has been STOPPED"
          - "=========================================="
          - "  Python receiver : stopped"
          - "  Containerlab    : destroyed"
          - "  Mattermost      : stopped"
          - "  PostgreSQL      : stopped"
          - "  Volumes         : {{ 'REMOVED' if wipe_data | bool else 'preserved' }}"
          - "------------------------------------------"
          - "  To restart: ansible-playbook scripts/lab-start.yml"
          - "  Log backup: {{ receiver_log }}.bak"
          - "=========================================="
