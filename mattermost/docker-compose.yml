services:
  mattermost-db:
    image: postgres:14
    container_name: marr-mattermost-db
    environment:
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost
      POSTGRES_DB: mattermost
    volumes:
      - marr-mm-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      marr-net:
        ipv4_address: 172.21.0.30

  mattermost:
    image: mattermost/mattermost-team-edition:9.4
    container_name: marr-mattermost
    depends_on:
      mattermost-db:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:mattermost@marr-mattermost-db:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
    volumes:
      - marr-mm-data:/mattermost/data
    ports:
      - "8065:8065/tcp"
    networks:
      marr-net:
        ipv4_address: 172.21.0.31

volumes:
  marr-mm-db:
  marr-mm-data:

networks:
  marr-net:
    external: true
