# Override OpenNMS Horizon Geographical Map tile provider.
# Reason: OpenStreetMap Foundation tightened tile usage policy in March 2026
# and now rejects tile requests with no Referer header, which the default
# tiles.opennms.org pipeline triggers when the UI is served over plain HTTP.
# OpenTopoMap is on the Horizon CSP allowlist by default, so no web.xml patch.
gwt.openlayers.name=OpenTopoMap
gwt.openlayers.url=https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png
gwt.openlayers.options.attribution=Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap (CC-BY-SA)
gwt.openlayers.userDefinedAsDefault=true
