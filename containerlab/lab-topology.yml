name: marr-lab
topology:
  nodes:
    router1:
      kind: linux
      image: marr-frr-snmp:v1
      mgmt-ipv4: 172.21.0.101
      binds:
        - configs/router1/daemons:/etc/frr/daemons
        - configs/router1/frr.conf:/etc/frr/frr.conf
        - configs/router1/snmpd.conf:/etc/snmp/snmpd.conf
      exec:
        - snmpd -C -c /etc/snmp/snmpd.conf

    router2:
      kind: linux
      image: marr-frr-snmp:v1
      mgmt-ipv4: 172.21.0.102
      binds:
        - configs/router2/daemons:/etc/frr/daemons
        - configs/router2/frr.conf:/etc/frr/frr.conf
        - configs/router2/snmpd.conf:/etc/snmp/snmpd.conf
      exec:
        - snmpd -C -c /etc/snmp/snmpd.conf

    router3:
      kind: linux
      image: marr-frr-snmp:v1
      mgmt-ipv4: 172.21.0.103
      binds:
        - configs/router3/daemons:/etc/frr/daemons
        - configs/router3/frr.conf:/etc/frr/frr.conf
        - configs/router3/snmpd.conf:/etc/snmp/snmpd.conf
      exec:
        - snmpd -C -c /etc/snmp/snmpd.conf

    solent-2-router:
      kind: linux
      image: marr-frr-snmp:v1
      mgmt-ipv4: 172.21.0.111
      binds:
        - configs/solent-2-router/daemons:/etc/frr/daemons
        - configs/solent-2-router/frr.conf:/etc/frr/frr.conf
        - configs/router1/snmpd.conf:/etc/snmp/snmpd.conf
      exec:
        - snmpd -C -c /etc/snmp/snmpd.conf

    solent-1-router:
      kind: linux
      image: marr-frr-snmp:v1
      mgmt-ipv4: 172.21.0.121
      binds:
        - configs/solent-1-router/daemons:/etc/frr/daemons
        - configs/solent-1-router/frr.conf:/etc/frr/frr.conf
        - configs/router1/snmpd.conf:/etc/snmp/snmpd.conf
      exec:
        - snmpd -C -c /etc/snmp/snmpd.conf

    snmp-notifier:
      kind: linux
      image: marr-snmp-notifier:v1
      mgmt-ipv4: 172.21.0.14
      binds:
        - ../python/snmp_listener.py:/opt/snmp_listener.py:ro
      ports:
        - 162:162/udp

  links:
    - endpoints: ["router1:eth1", "router2:eth1"]
    - endpoints: ["router2:eth2", "router3:eth1"]
    - endpoints: ["router1:eth2", "router3:eth2"]
    - endpoints: ["router1:eth3", "solent-2-router:eth1"]
    - endpoints: ["router2:eth3", "solent-1-router:eth1"]

mgmt:
  network: marr-net
  ipv4-subnet: 172.21.0.0/16
