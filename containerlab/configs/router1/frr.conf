frr version 8.4_git
frr defaults traditional
hostname router1
log syslog informational
no ipv6 forwarding
!
ip route 192.168.1.0/24 Null0
!
interface eth1
 ip address 10.0.12.1/30
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.0.13.1/30
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface eth3
 ip address 10.0.14.1/30
exit
!
router bgp 65001
 bgp router-id 10.0.12.1
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.2 remote-as 65003
 neighbor 10.0.14.2 remote-as 65004
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
 exit-address-family
exit
!
router ospf
 ospf router-id 10.0.12.1
 network 10.0.12.0/30 area 0
 network 10.0.13.0/30 area 0
 passive-interface eth3
exit
!
