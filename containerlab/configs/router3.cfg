hostname router3
ip routing

interface Management0
   ip address 172.20.21.13/24
   no shutdown

interface Loopback0
   ip address 10.0.0.3/32

interface Ethernet1
   description LINK_TO_ROUTER1
   ip address 10.1.13.2/30
   no switchport
   no shutdown

interface Ethernet2
   description LINK_TO_ROUTER2
   ip address 10.1.23.2/30
   no switchport
   no shutdown

router bgp 65003
   router-id 10.0.0.3
   neighbor 10.1.13.1 remote-as 65001
   neighbor 10.1.13.1 description PEER_ROUTER1
   neighbor 10.1.23.1 remote-as 65002
   neighbor 10.1.23.1 description PEER_ROUTER3
   address-family ipv4
      neighbor 10.1.13.1 activate
      neighbor 10.1.23.1 activate
      network 10.0.0.3/32

snmp-server community public ro
snmp-server host 172.20.21.100 version 2c public
snmp-server enable traps bgp
snmp-server enable traps snmp link-down
snmp-server enable traps snmp link-up

logging host 172.20.21.100
logging trap notifications
logging on
