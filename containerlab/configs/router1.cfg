hostname router1

interface Management0
   ip address 172.20.20.11/24
   no shutdown

interface Loopback0
   ip address 10.0.0.1/32

interface Ethernet1
   description LINK_TO_ROUTER2
   ip address 10.1.12.1/30
   no shutdown

interface Ethernet2
   description LINK_TO_ROUTER3
   ip address 10.1.13.1/30
   no shutdown

router bgp 65001
   router-id 10.0.0.1
   neighbor 10.1.12.2 remote-as 65002
   neighbor 10.1.12.2 description PEER_ROUTER2
   neighbor 10.1.13.2 remote-as 65003
   neighbor 10.1.13.2 description PEER_ROUTER3
   address-family ipv4
      neighbor 10.1.12.2 activate
      neighbor 10.1.13.2 activate
      network 10.0.0.1/32

snmp-server community public ro
snmp-server host 172.20.20.100 version 2c public
snmp-server enable traps bgp
snmp-server enable traps snmp link-down
snmp-server enable traps snmp link-up

logging host 172.20.20.100
logging trap notifications
logging on
