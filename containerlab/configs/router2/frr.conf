frr version 9.1.0
frr defaults traditional
hostname router2
log syslog informational
log facility local7
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.12.2/30
 ip ospf area 0
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface eth2
 ip address 10.0.23.1/30
 ip ospf area 0
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface lo
 ip address 10.255.0.2/32
 ip ospf area 0
!
router ospf
 ospf router-id 10.255.0.2
 network 10.0.0.0/8 area 0
 passive-interface lo
!
router bgp 65002
 bgp router-id 10.255.0.2
 bgp log-neighbor-changes
 !
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.12.1 description router1
 neighbor 10.0.12.1 bfd
 neighbor 10.0.12.1 timers 10 30
 !
 neighbor 10.0.23.2 remote-as 65003
 neighbor 10.0.23.2 description router3
 neighbor 10.0.23.2 bfd
 neighbor 10.0.23.2 timers 10 30
 !
 address-family ipv4 unicast
  network 10.255.0.2/32
 exit-address-family
!
line vty
!
