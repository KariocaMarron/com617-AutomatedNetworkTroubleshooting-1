hostname router2

interface Management0
   ip address 172.20.20.12/24
   no shutdown

interface Loopback0
   ip address 10.0.0.2/32

interface Ethernet1
   description LINK_TO_ROUTER1
   ip address 10.1.12.2/30
   no shutdown

interface Ethernet2
   description LINK_TO_ROUTER3
   ip address 10.1.23.1/30
   no shutdown

router bgp 65002
   router-id 10.0.0.2
   neighbor 10.1.12.1 remote-as 65001
   neighbor 10.1.12.1 description PEER_ROUTER1
   neighbor 10.1.23.2 remote-as 65003
   neighbor 10.1.23.2 description PEER_ROUTER3
   address-family ipv4
      neighbor 10.1.12.1 activate
      neighbor 10.1.23.2 activate
      network 10.0.0.2/32

snmp-server community public ro
snmp-server host 172.20.20.100 version 2c public
snmp-server enable traps bgp
snmp-server enable traps snmp link-down
snmp-server enable traps snmp link-up

logging host 172.20.20.100
logging trap notifications
logging on
