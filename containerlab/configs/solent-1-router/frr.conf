frr version 8.4_git
frr defaults traditional
hostname solent-1-router
log syslog informational
no ipv6 forwarding
!
ip route 192.168.12.0/24 Null0
!
interface eth1
 ip address 10.0.15.2/30
exit
!
router bgp 65005
 bgp router-id 10.0.15.2
 no bgp ebgp-requires-policy
 neighbor 10.0.15.1 remote-as 65002
 !
 address-family ipv4 unicast
  network 192.168.12.0/24
 exit-address-family
exit
!
