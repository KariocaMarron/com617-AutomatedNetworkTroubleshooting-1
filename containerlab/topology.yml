name: com617-marr-lab

mgmt:
  network: marr-mgmt
  ipv4-subnet: 172.20.0.0/24

topology:

  defaults:
    env:
      TOPO_FILE: /etc/frr/frr.conf

  nodes:

    # ── Router 1 — Core (hub) ─────────────────────────────────────────
    router1:
      kind: linux
      image: frrouting/frr:v8.4.1
      mgmt-ipv4: 172.20.0.11
      binds:
        - configs/router1/frr.conf:/etc/frr/frr.conf
        - configs/router1/daemons:/etc/frr/daemons
      env:
        HOSTNAME: router1

    # ── Router 2 — Distribution ───────────────────────────────────────
    router2:
      kind: linux
      image: frrouting/frr:v8.4.1
      mgmt-ipv4: 172.20.0.12
      binds:
        - configs/router2/frr.conf:/etc/frr/frr.conf
        - configs/router2/daemons:/etc/frr/daemons
      env:
        HOSTNAME: router2

    # ── Router 3 — Distribution ───────────────────────────────────────
    router3:
      kind: linux
      image: frrouting/frr:v8.4.1
      mgmt-ipv4: 172.20.0.13
      binds:
        - configs/router3/frr.conf:/etc/frr/frr.conf
        - configs/router3/daemons:/etc/frr/daemons
      env:
        HOSTNAME: router3

    # ── SNMP Notifier ─────────────────────────────────────────────────
    snmp-notifier:
      kind: linux
      image: ubuntu:22.04
      mgmt-ipv4: 172.20.0.14
      ports:
        - 162:162/udp

    # ── OpenNMS Horizon — Monitor layer ───────────────────────────────
    opennms:
      kind: linux
      image: opennms/horizon:33.0.2
      mgmt-ipv4: 172.20.0.20
      ports:
        - "8980:8980/tcp"
        - "8101:8101/tcp"
      binds:
        - configs/opennms/opennms.env:/opt/opennms/etc/opennms.env
        - configs/opennms/overlay:/opt/opennms-overlay
      env:
        POSTGRES_HOST: 172.20.0.21
        POSTGRES_PORT: "5432"
        POSTGRES_USER: opennms
        POSTGRES_PASSWORD: opennms
      cmd: "-s"

    # ── PostgreSQL for OpenNMS ─────────────────────────────────────────
    opennms-db:
      kind: linux
      image: postgres:14
      mgmt-ipv4: 172.20.0.21
      env:
        POSTGRES_USER: opennms
        POSTGRES_PASSWORD: opennms
        POSTGRES_DB: opennms

  links:
    # router1 <-> router2  (primary link)
    - endpoints: ["router1:eth1", "router2:eth1"]
    # router1 <-> router3  (primary link)
    - endpoints: ["router1:eth2", "router3:eth1"]
    # router2 <-> router3  (redundant link)
    - endpoints: ["router2:eth2", "router3:eth2"]
