version: '3.8'

networks:
  marr-reporting:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  mattermost-data:
  mattermost-logs:
  mattermost-config:
  postgres-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: marr-postgres
    restart: unless-stopped
    networks:
      marr-reporting:
        ipv4_address: 172.21.0.10
    environment:
      POSTGRES_USER:     mattermost
      POSTGRES_PASSWORD: mattermost_pass
      POSTGRES_DB:       mattermost
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mattermost:
    image: mattermost/mattermost-team-edition:9.5
    container_name: marr-mattermost
    restart: unless-stopped
    networks:
      marr-reporting:
        ipv4_address: 172.21.0.11
    ports:
      - "8065:8065"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME:          postgres
      MM_SQLSETTINGS_DATASOURCE:          postgres://mattermost:mattermost_pass@172.21.0.10:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL:         http://localhost:8065
      MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS: "true"
      MM_LOGSETTINGS_ENABLECONSOLE:       "true"
      MM_LOGSETTINGS_CONSOLELEVEL:        INFO
    volumes:
      - mattermost-data:/mattermost/data
      - mattermost-logs:/mattermost/logs
      - mattermost-config:/mattermost/config


  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: marr-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - marr-reporting

  grafana:
    image: grafana/grafana:10.4.0
    container_name: marr-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=marr2026
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    networks:
      - marr-reporting

  redis:
    image: redis:7.2-alpine
    container_name: marr-redis
    ports:
      - "6379:6379"
    networks:
      - marr-reporting

  vault:
    image: hashicorp/vault:1.16.1
    container_name: marr-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    networks:
      - marr-reporting

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: marr-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - marr-reporting


