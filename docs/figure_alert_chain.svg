<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" width="1500" height="1100" font-family="Trebuchet MS, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#333"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#cc6600"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#6a1b9a"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#c2185b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#c62828"/>
    </marker>
  </defs>

  <text x="750" y="30" font-size="22" font-weight="bold" text-anchor="middle">End-to-End Alert Chain - Single-Event vs Correlated Flow</text>
  <text x="750" y="52" font-size="13" text-anchor="middle" fill="#555">Sequence diagram. Time advances left to right within each flow. Vertical lines are component lifelines.</text>
<text x="90" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#666">Source</text><text x="90" y="104" font-size="11" font-weight="bold" text-anchor="middle" fill="#666">(SNMP trap)</text><line x1="90" y1="130" x2="90" y2="1020" stroke="#666" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="250" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#cc6600">snmp-notifier</text><line x1="250" y1="130" x2="250" y2="1020" stroke="#cc6600" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="410" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#1565c0">marr-kafka</text><line x1="410" y1="130" x2="410" y2="1020" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="580" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#cc6600">marr-receiver</text><line x1="580" y1="130" x2="580" y2="1020" stroke="#cc6600" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="760" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#6a1b9a">marr-correlator</text><line x1="760" y1="130" x2="760" y2="1020" stroke="#6a1b9a" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="940" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#6a1b9a">marr-redis</text><line x1="940" y1="130" x2="940" y2="1020" stroke="#6a1b9a" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/><text x="1140" y="90" font-size="11" font-weight="bold" text-anchor="middle" fill="#c2185b">Mattermost</text><text x="1140" y="104" font-size="11" font-weight="bold" text-anchor="middle" fill="#c2185b">(network-alerts)</text><line x1="1140" y1="130" x2="1140" y2="1020" stroke="#c2185b" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
<rect x="20" y="115" width="1460" height="370" fill="#fafafa" stroke="#ddd" stroke-width="0.8" rx="6"/>
<text x="40" y="130" font-size="14" font-weight="bold" fill="#444">FLOW A - Single isolated alert (no correlation match)</text>
<text x="1460" y="130" font-size="11" text-anchor="end" fill="#666" font-style="italic">end-to-end ~2.7 s</text>

<rect x="20" y="515" width="1460" height="520" fill="#f5f0fa" stroke="#ddd" stroke-width="0.8" rx="6"/>
<text x="40" y="530" font-size="14" font-weight="bold" fill="#444">FLOW B - Cascade of three related alerts (correlation triggered, two per-event reports suppressed)</text>
<text x="1460" y="530" font-size="11" text-anchor="end" fill="#666" font-style="italic">window 30 s, threshold ≥ 2 events</text>
<line x1="90" y1="165" x2="250" y2="165" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="170" y="159" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">(1) trap arrives</text><line x1="250" y1="200" x2="410" y2="200" stroke="#1565c0" stroke-width="1.8"  marker-end="url(#arrow-blue)"/><text x="330" y="194" font-size="9" text-anchor="middle" fill="#1565c0" font-weight="bold">(2) publish snmp.traps</text><line x1="250" y1="235" x2="580" y2="235" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="415" y="229" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">(3) HTTP POST /alert</text><line x1="580" y1="275" x2="940" y2="275" stroke="#6a1b9a" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/><text x="760" y="269" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">(4) suppression check (lease MISS)</text><line x1="940" y1="305" x2="580" y2="305" stroke="#6a1b9a" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/><text x="760" y="299" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">(5) MISS - proceed</text><rect x="490" y="338" width="180" height="24" fill="#fff3e0" stroke="#2e7d32" stroke-width="1.5" rx="3"/><text x="580" y="354" font-size="10" text-anchor="middle" fill="#2e7d32" font-weight="bold">(6) classify, run ansible playbook (4 vtysh tasks)</text><line x1="580" y1="410" x2="1140" y2="410" stroke="#c2185b" stroke-width="1.8"  marker-end="url(#arrow-pink)"/><text x="860" y="404" font-size="9" text-anchor="middle" fill="#c2185b" font-weight="bold">(7) per-event Mattermost report</text><rect x="1030" y="435" width="220" height="20" fill="#fff" stroke="#c2185b" stroke-width="1" rx="3"/><text x="1140" y="449" font-size="9" text-anchor="middle" fill="#c2185b">Network Incident Report  -  rendered in #network-alerts</text><line x1="90" y1="565" x2="250" y2="565" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="170" y="560" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">(1) trap1 (ifIndex=30)</text><line x1="250" y1="590" x2="410" y2="590" stroke="#1565c0" stroke-width="1.8"  marker-end="url(#arrow-blue)"/><text x="330" y="585" font-size="9" text-anchor="middle" fill="#1565c0" font-weight="bold">publish</text><line x1="250" y1="615" x2="580" y2="615" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="415" y="610" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">POST /alert</text><line x1="410" y1="640" x2="760" y2="640" stroke="#6a1b9a" stroke-width="1.8"  marker-end="url(#arrow-purple)"/><text x="585" y="635" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">consume</text><line x1="760" y1="665" x2="940" y2="665" stroke="#6a1b9a" stroke-width="1.8"  marker-end="url(#arrow-purple)"/><text x="850" y="660" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">ZADD window key (count=1)</text><line x1="580" y1="690" x2="940" y2="690" stroke="#6a1b9a" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/><text x="760" y="685" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">suppression check (MISS)</text><line x1="580" y1="715" x2="1140" y2="715" stroke="#c2185b" stroke-width="1.8"  marker-end="url(#arrow-pink)"/><text x="860" y="710" font-size="9" text-anchor="middle" fill="#c2185b" font-weight="bold">per-event report 1 SENT</text><line x1="90" y1="745" x2="250" y2="745" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="170" y="740" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">(2) trap2 (ifIndex=30, +3s)</text><line x1="410" y1="770" x2="760" y2="770" stroke="#6a1b9a" stroke-width="1.8"  marker-end="url(#arrow-purple)"/><text x="585" y="765" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">consume</text><line x1="760" y1="795" x2="940" y2="795" stroke="#6a1b9a" stroke-width="1.8"  marker-end="url(#arrow-purple)"/><text x="850" y="790" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">ZADD window key (count=2 - threshold)</text><line x1="760" y1="815" x2="940" y2="815" stroke="#6a1b9a" stroke-width="1.8"  marker-end="url(#arrow-purple)"/><text x="850" y="810" font-size="9" text-anchor="middle" fill="#6a1b9a" font-weight="bold">SET NX EX lease (ACQUIRED)</text><line x1="580" y1="838" x2="940" y2="838" stroke="#c62828" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/><text x="760" y="833" font-size="9" text-anchor="middle" fill="#c62828" font-weight="bold">suppression check (HIT - lease exists)</text><rect x="490" y="848" width="180" height="20" fill="#ffe7e7" stroke="#c62828" stroke-width="1.2" rx="3"/><text x="580" y="862" font-size="9" text-anchor="middle" fill="#c62828" font-weight="bold">report 2 SUPPRESSED</text><line x1="90" y1="890" x2="250" y2="890" stroke="#cc6600" stroke-width="1.8"  marker-end="url(#arrow-orange)"/><text x="170" y="885" font-size="9" text-anchor="middle" fill="#cc6600" font-weight="bold">(3) trap3 (ifIndex=30, +6s)</text><line x1="580" y1="910" x2="940" y2="910" stroke="#c62828" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/><text x="760" y="905" font-size="9" text-anchor="middle" fill="#c62828" font-weight="bold">suppression check (HIT)</text><rect x="490" y="918" width="180" height="20" fill="#ffe7e7" stroke="#c62828" stroke-width="1.2" rx="3"/><text x="580" y="932" font-size="9" text-anchor="middle" fill="#c62828" font-weight="bold">report 3 SUPPRESSED</text><line x1="760" y1="968" x2="1140" y2="968" stroke="#c2185b" stroke-width="1.8"  marker-end="url(#arrow-pink)"/><text x="950" y="963" font-size="9" text-anchor="middle" fill="#c2185b" font-weight="bold">(4) GROUPED REPORT - 2 of 3 events (idempotency-gated)</text><rect x="990" y="985" width="300" height="20" fill="#fff" stroke="#c2185b" stroke-width="1" rx="3"/><text x="1140" y="999" font-size="9" text-anchor="middle" fill="#c2185b">Network Incident (correlated)  -  source key unknown::30</text>
<rect x="690" y="850" width="140" height="100" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2" rx="3" opacity="0.5"/>
<text x="760" y="870" font-size="9" text-anchor="middle" fill="#5d4037" font-weight="bold">LEASE HOLDER</text>
<text x="760" y="884" font-size="9" text-anchor="middle" fill="#5d4037">blocking time.sleep</text>
<text x="760" y="898" font-size="9" text-anchor="middle" fill="#5d4037">window = 30 s</text>
<text x="760" y="918" font-size="9" text-anchor="middle" fill="#c62828" font-style="italic">trap3 lands during this</text>
<text x="760" y="932" font-size="9" text-anchor="middle" fill="#c62828" font-style="italic">window so it is not</text>
<text x="760" y="946" font-size="9" text-anchor="middle" fill="#c62828" font-style="italic">folded into the group</text>

<rect x="20" y="1040" width="1460" height="50" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3"/>
<text x="40" y="1058" font-size="10" font-weight="bold" fill="#333">Legend:</text>
<line x1="115" y1="1054" x2="160" y2="1054" stroke="#cc6600" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<text x="170" y="1057" font-size="10" fill="#444">trap arrives / HTTP POST</text>

<line x1="345" y1="1054" x2="390" y2="1054" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
<text x="400" y="1057" font-size="10" fill="#444">Kafka publish</text>

<line x1="525" y1="1054" x2="570" y2="1054" stroke="#6a1b9a" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
<text x="580" y="1057" font-size="10" fill="#444">correlator / Redis state</text>

<line x1="775" y1="1054" x2="820" y2="1054" stroke="#c62828" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
<text x="830" y="1057" font-size="10" fill="#444">suppression hit (per-event report blocked)</text>

<line x1="1115" y1="1054" x2="1160" y2="1054" stroke="#c2185b" stroke-width="1.8" marker-end="url(#arrow-pink)"/>
<text x="1170" y="1057" font-size="10" fill="#444">Mattermost report (per-event or correlated)</text>

<text x="40" y="1078" font-size="9" font-style="italic" fill="#666">Flow A (top) is the default path. Flow B (bottom) is what happens when ≥ 2 events sharing a source key arrive within the 30 s window.</text>
</svg>