<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1000" width="1300" height="1000" font-family="Trebuchet MS, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#333"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#c2185b"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#6a1b9a"/>
    </marker>
  </defs>

  <text x="650" y="30" font-size="22" font-weight="bold" text-anchor="middle">Mattermost network-alerts Channel Flow</text>
  <text x="650" y="52" font-size="13" text-anchor="middle" fill="#555">Two report producers, one delivery surface. Engineer view of how per-event and correlated reports appear.</text>

  <!-- Left side: Two producers -->
  <text x="200" y="100" font-size="14" font-weight="bold" fill="#444">Producers</text>

  <!-- Per-event producer box -->
  <rect x="60" y="120" width="280" height="120" fill="#fff3e0" stroke="#cc6600" stroke-width="1.5" rx="6"/>
  <text x="200" y="142" font-size="13" font-weight="bold" text-anchor="middle">marr-receiver</text>
  <text x="200" y="160" font-size="10" text-anchor="middle" fill="#444">(host-side systemd)</text>
  <text x="200" y="180" font-size="11" text-anchor="middle" fill="#666">- runs Ansible playbook</text>
  <text x="200" y="195" font-size="11" text-anchor="middle" fill="#666">- consults Redis lease key</text>
  <text x="200" y="210" font-size="11" text-anchor="middle" fill="#666">- if MISS, sends per-event report</text>
  <text x="200" y="228" font-size="10" text-anchor="middle" font-style="italic" fill="#cc6600">PRODUCER A</text>

  <!-- Correlator producer box -->
  <rect x="60" y="290" width="280" height="120" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" rx="6"/>
  <text x="200" y="312" font-size="13" font-weight="bold" text-anchor="middle">marr-correlator</text>
  <text x="200" y="330" font-size="10" text-anchor="middle" fill="#444">(host-side systemd)</text>
  <text x="200" y="350" font-size="11" text-anchor="middle" fill="#666">- holds lease for window (30 s)</text>
  <text x="200" y="365" font-size="11" text-anchor="middle" fill="#666">- accumulates events on source key</text>
  <text x="200" y="380" font-size="11" text-anchor="middle" fill="#666">- emits one grouped report per window</text>
  <text x="200" y="398" font-size="10" text-anchor="middle" font-style="italic" fill="#6a1b9a">PRODUCER B</text>

  <!-- Webhook arrows converging -->
  <path d="M 340 180 Q 460 180 510 280" stroke="#c2185b" stroke-width="2" fill="none" marker-end="url(#arrow-pink)"/>
  <text x="430" y="160" font-size="10" font-weight="bold" fill="#c2185b">webhook POST</text>
  <text x="430" y="173" font-size="9" fill="#666">single per-event report</text>

  <path d="M 340 350 Q 460 350 510 320" stroke="#c2185b" stroke-width="2" fill="none" marker-end="url(#arrow-pink)"/>
  <text x="430" y="395" font-size="10" font-weight="bold" fill="#c2185b">webhook POST</text>
  <text x="430" y="408" font-size="9" fill="#666">grouped (correlated) report</text>

  <!-- Webhook endpoint -->
  <rect x="510" y="270" width="200" height="60" fill="#fce4ec" stroke="#c2185b" stroke-width="1.8" rx="4"/>
  <text x="610" y="290" font-size="12" font-weight="bold" text-anchor="middle">marr-mattermost</text>
  <text x="610" y="306" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">/hooks/qn84n14h...</text>
  <text x="610" y="321" font-size="9" text-anchor="middle" fill="#444">single delivery surface</text>

  <!-- Channel arrow -->
  <line x1="710" y1="300" x2="780" y2="300" stroke="#c2185b" stroke-width="2" marker-end="url(#arrow-pink)"/>

  <!-- Right side: Mattermost channel mockup -->
  <text x="1020" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#444">Engineer view: #network-alerts channel</text>

  <!-- Mattermost UI mockup: outer chrome -->
  <rect x="780" y="120" width="480" height="800" fill="#fff" stroke="#444" stroke-width="1.5" rx="6"/>
  <rect x="780" y="120" width="480" height="40" fill="#1e88e5" rx="6"/>
  <rect x="780" y="140" width="480" height="20" fill="#1e88e5"/>
  <text x="800" y="146" font-size="11" font-weight="bold" fill="#fff">network-alerts</text>
  <text x="800" y="156" font-size="9" fill="#bbdefb">MARR-Lab  -  Town Square</text>

  <!-- Message 1: per-event report (single isolated alert) -->
  <text x="800" y="190" font-size="11" font-weight="bold" fill="#cc6600">PER-EVENT REPORT (single alert)</text>
  <rect x="800" y="200" width="440" height="180" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="4"/>
  <circle cx="820" cy="220" r="10" fill="#7e57c2"/>
  <text x="820" y="224" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">K</text>
  <text x="840" y="218" font-size="11" font-weight="bold">kariocamarron</text>
  <text x="980" y="218" font-size="9" fill="#999">BOT  10:51 PM</text>
  <text x="840" y="242" font-size="13" font-weight="bold" fill="#ff9800">⬤ Network Incident Report</text>

  <!-- Field rows for per-event report -->
  <rect x="840" y="252" width="380" height="118" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
  <line x1="950" y1="252" x2="950" y2="370" stroke="#ddd" stroke-width="0.5"/>
  <line x1="840" y1="270" x2="1220" y2="270" stroke="#ddd" stroke-width="0.5"/>
  <line x1="840" y1="288" x2="1220" y2="288" stroke="#ddd" stroke-width="0.5"/>
  <line x1="840" y1="306" x2="1220" y2="306" stroke="#ddd" stroke-width="0.5"/>
  <line x1="840" y1="324" x2="1220" y2="324" stroke="#ddd" stroke-width="0.5"/>
  <line x1="840" y1="342" x2="1220" y2="342" stroke="#ddd" stroke-width="0.5"/>

  <text x="845" y="265" font-size="9" font-weight="bold">Alert ID</text>
  <text x="955" y="265" font-size="9" font-family="Courier New, monospace">snmp-7969917</text>
  <text x="845" y="283" font-size="9" font-weight="bold">Node</text>
  <text x="955" y="283" font-size="9" font-family="Courier New, monospace">unknown</text>
  <text x="845" y="301" font-size="9" font-weight="bold">Severity</text>
  <text x="955" y="301" font-size="9">MAJOR</text>
  <text x="845" y="319" font-size="9" font-weight="bold">Fault Type</text>
  <text x="955" y="319" font-size="9" font-family="Courier New, monospace">link_down</text>
  <text x="845" y="337" font-size="9" font-weight="bold">Playbook</text>
  <text x="955" y="337" font-size="9" font-family="Courier New, monospace">diagnose_link_down</text>
  <text x="845" y="355" font-size="9" font-weight="bold">Diag Status</text>
  <text x="955" y="355" font-size="9" fill="#f9a825">⚠ 2/6 ok, 4 failed (play rc=0)</text>

  <!-- Annotation pointer A -->
  <line x1="730" y1="290" x2="800" y2="290" stroke="#cc6600" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="730" y="280" font-size="9" text-anchor="end" fill="#cc6600" font-style="italic">structured fields:</text>
  <text x="730" y="293" font-size="9" text-anchor="end" fill="#cc6600" font-style="italic">one row = one alert</text>

  <!-- Message 2: correlated report (grouped) -->
  <text x="800" y="430" font-size="11" font-weight="bold" fill="#6a1b9a">CORRELATED REPORT (grouped)</text>
  <rect x="800" y="440" width="440" height="320" fill="#faf5fc" stroke="#ce93d8" stroke-width="1.5" rx="4"/>
  <circle cx="820" cy="460" r="10" fill="#7e57c2"/>
  <text x="820" y="464" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">K</text>
  <text x="840" y="458" font-size="11" font-weight="bold">kariocamarron</text>
  <text x="980" y="458" font-size="9" fill="#999">BOT  10:51 PM</text>
  <text x="840" y="482" font-size="13" font-weight="bold" fill="#ff9800">⬤ Network Incident (correlated)</text>

  <!-- Header rows -->
  <text x="840" y="504" font-size="10"><tspan font-weight="bold">Source key:</tspan> <tspan font-family="Courier New, monospace">unknown::30</tspan></text>
  <text x="840" y="520" font-size="10"><tspan font-weight="bold">Constituent events:</tspan> 2</text>
  <text x="840" y="536" font-size="10"><tspan font-weight="bold">Top severity:</tspan> MAJOR</text>
  <text x="840" y="552" font-size="10"><tspan font-weight="bold">Inferred root cause:</tspan></text>
  <text x="840" y="566" font-size="10" font-family="Courier New, monospace" fill="#444">snmp-7969935 (uei.opennms.org/generic/traps/SNMP_Link_Down)</text>

  <!-- Constituent events table -->
  <rect x="840" y="578" width="380" height="80" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
  <rect x="840" y="578" width="380" height="20" fill="#f5f5f5"/>
  <line x1="940" y1="578" x2="940" y2="658" stroke="#ddd"/>
  <line x1="1010" y1="578" x2="1010" y2="658" stroke="#ddd"/>
  <line x1="1170" y1="578" x2="1170" y2="658" stroke="#ddd"/>
  <line x1="840" y1="598" x2="1220" y2="598" stroke="#ddd"/>
  <line x1="840" y1="618" x2="1220" y2="618" stroke="#ddd"/>
  <line x1="840" y1="638" x2="1220" y2="638" stroke="#ddd"/>

  <text x="845" y="592" font-size="9" font-weight="bold">ID</text>
  <text x="945" y="592" font-size="9" font-weight="bold">Severity</text>
  <text x="1015" y="592" font-size="9" font-weight="bold">UEI</text>
  <text x="1175" y="592" font-size="9" font-weight="bold">Node</text>

  <text x="845" y="612" font-size="9" font-family="Courier New, monospace">snmp-7969935</text>
  <text x="945" y="612" font-size="9">MAJOR</text>
  <text x="1015" y="612" font-size="9" font-family="Courier New, monospace">SNMP_Link_Down</text>
  <text x="1175" y="612" font-size="9" font-family="Courier New, monospace">unknown</text>

  <text x="845" y="632" font-size="9" font-family="Courier New, monospace">snmp-7969936</text>
  <text x="945" y="632" font-size="9">MAJOR</text>
  <text x="1015" y="632" font-size="9" font-family="Courier New, monospace">SNMP_Link_Down</text>
  <text x="1175" y="632" font-size="9" font-family="Courier New, monospace">unknown</text>

  <text x="840" y="678" font-size="10" font-weight="bold">Collapsed diagnostic context (per event):</text>
  <rect x="840" y="685" width="380" height="65" fill="#1e1e1e" rx="3"/>
  <text x="850" y="700" font-size="9" font-family="Courier New, monospace" fill="#bbb">[snmp-7969935] play rc=0</text>
  <text x="850" y="713" font-size="9" font-family="Courier New, monospace" fill="#888">PLAY [Diagnose Link Down Event] ******</text>
  <text x="850" y="725" font-size="9" font-family="Courier New, monospace" fill="#888">TASK [Collect interface status] *******</text>
  <text x="850" y="737" font-size="9" font-family="Courier New, monospace" fill="#ef9a9a">[ERROR]: Could not find container ...</text>

  <!-- Annotation pointer B -->
  <line x1="730" y1="510" x2="800" y2="510" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="730" y="500" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">grouped: 2+ events</text>
  <text x="730" y="513" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">share a source key</text>

  <line x1="730" y1="610" x2="800" y2="610" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="730" y="603" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">constituent events</text>
  <text x="730" y="616" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">listed inline</text>

  <line x1="730" y1="715" x2="800" y2="715" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="730" y="708" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">collapsed diag context</text>
  <text x="730" y="721" font-size="9" text-anchor="end" fill="#6a1b9a" font-style="italic">per event in the group</text>

  <!-- Message 3: another per-event for context -->
  <text x="800" y="790" font-size="11" font-weight="bold" fill="#cc6600">NEXT PER-EVENT REPORT (channel continues)</text>
  <rect x="800" y="800" width="440" height="80" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="4"/>
  <circle cx="820" cy="820" r="10" fill="#7e57c2"/>
  <text x="820" y="824" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">K</text>
  <text x="840" y="818" font-size="11" font-weight="bold">kariocamarron</text>
  <text x="980" y="818" font-size="9" fill="#999">BOT  10:55 PM</text>
  <text x="840" y="842" font-size="12" font-weight="bold" fill="#ff9800">⬤ Network Incident Report</text>
  <text x="840" y="862" font-size="10" fill="#666">snmp-7970012  -  unknown  -  link_down  -  Diag Status: ✓ rc=0</text>
  <text x="840" y="876" font-size="9" fill="#999" font-style="italic">(distinct source key: appears as a fresh per-event report)</text>

  <!-- Engineer reading note -->
  <rect x="800" y="894" width="440" height="20" fill="#fffde7" stroke="#fbc02d" stroke-width="0.8" rx="3"/>
  <text x="1020" y="908" font-size="10" text-anchor="middle" fill="#5d4037" font-style="italic">Engineer scrolls top-to-bottom, reading severity badges and Diag Status indicators first.</text>

  <!-- Bottom note -->
  <text x="650" y="950" font-size="11" font-weight="bold" text-anchor="middle" fill="#444">Engineer reads severity badges and Diag Status indicators first; tables enable horizontal scanning across constituent events.</text>
  <text x="650" y="970" font-size="10" text-anchor="middle" fill="#666" font-style="italic">Both report types share the same channel and visual style. The "(correlated)" tag in the title is the only structural distinction.</text>
  <text x="650" y="985" font-size="10" text-anchor="middle" fill="#666" font-style="italic">Suppressed per-event reports for traps already covered by a correlated report do not appear in the channel at all.</text>
</svg>