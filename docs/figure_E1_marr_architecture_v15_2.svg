<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 880" font-family="Trebuchet MS, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: bold; fill: #000; }
    .subtitle { font-size: 12px; fill: #555; }
    .plane-label { font-size: 14px; font-weight: bold; fill: #333; }
    .plane-cidr { font-size: 11px; fill: #666; }
    .stage-label { font-size: 13px; font-weight: bold; fill: #333; text-anchor: middle; }
    .stage-sub { font-size: 11px; fill: #666; text-anchor: middle; }
    .box-title { font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle; }
    .box-detail { font-size: 10px; fill: #444; text-anchor: middle; }
    .box-mono { font-size: 10px; fill: #444; text-anchor: middle; font-family: 'Courier New', monospace; }
    .arrow-label { font-size: 9.5px; fill: #444; }
    .arrow-label-c { font-size: 9.5px; fill: #444; text-anchor: middle; }
    .legend-text { font-size: 11px; fill: #333; }
    .note-text { font-size: 10px; fill: #555; }
    .annot-text { font-size: 9.5px; fill: #6a3a8a; font-style: italic; text-anchor: middle; }
    .plane { fill: #fafafa; stroke: #888; stroke-width: 1; }
    .plane-reporting { fill: #f0f4fa; stroke: #6a85b6; stroke-width: 1; }
    .frr-box { fill: #e8e8e8; stroke: #555; stroke-width: 1.5; }
    .ingest-box { fill: #fff2e0; stroke: #d97706; stroke-width: 1.5; }
    .receiver-box { fill: #fff2e0; stroke: #d97706; stroke-width: 1.5; }
    .kafka-box { fill: #dde9f7; stroke: #1d4ed8; stroke-width: 1.5; }
    .correlator-box { fill: #ead8ee; stroke: #7e22ce; stroke-width: 1.5; }
    .redis-box { fill: #ead8ee; stroke: #7e22ce; stroke-width: 1.5; }
    .ansible-box { fill: #d8eddc; stroke: #15803d; stroke-width: 1.5; }
    .frr-vtysh-box { fill: #d8eddc; stroke: #15803d; stroke-width: 1.5; }
    .mattermost-box { fill: #f9d8e7; stroke: #be185d; stroke-width: 1.5; }
    .opennms-box { fill: #f5f5f5; stroke: #555; stroke-width: 1; }
    .legend-box { fill: #fafafa; stroke: #888; stroke-width: 1; }
    .arrow-orange { stroke: #d97706; stroke-width: 1.8; fill: none; marker-end: url(#arr-orange); }
    .arrow-blue   { stroke: #1d4ed8; stroke-width: 1.8; fill: none; marker-end: url(#arr-blue); }
    .arrow-purple { stroke: #7e22ce; stroke-width: 1.8; fill: none; marker-end: url(#arr-purple); }
    .arrow-green  { stroke: #15803d; stroke-width: 1.8; fill: none; marker-end: url(#arr-green); }
    .arrow-pink   { stroke: #be185d; stroke-width: 1.8; fill: none; marker-end: url(#arr-pink); }
    .arrow-dashed { stroke: #555; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; marker-end: url(#arr-dashed); }
  </style>

  <defs>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7e22ce"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="arr-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#be185d"/>
    </marker>
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="650" y="28" class="title" text-anchor="middle">MARR System Architecture</text>
  <text x="650" y="46" class="subtitle" text-anchor="middle">Five-stage pipeline with decoupled correlator. Implementation as deployed in v4.0 lab, 3 May 2026.</text>

  <!-- ===== Operational plane ===== -->
  <rect x="20" y="60" width="1260" height="540" rx="6" class="plane"/>
  <text x="32" y="82" class="plane-label">marr-net - Operational monitoring plane</text>
  <text x="32" y="98" class="plane-cidr">172.21.0.0/16</text>

  <!-- Stage column headers -->
  <text x="125" y="120" class="stage-label">Stage 1</text>
  <text x="125" y="135" class="stage-sub">Ingestion</text>

  <text x="335" y="120" class="stage-label">Stage 2</text>
  <text x="335" y="135" class="stage-sub">Categorisation</text>

  <text x="570" y="120" class="stage-label">Stage 3</text>
  <text x="570" y="135" class="stage-sub">Correlation</text>

  <text x="810" y="120" class="stage-label">Stage 4</text>
  <text x="810" y="135" class="stage-sub">Diagnostics</text>

  <text x="1080" y="120" class="stage-label">Stage 5</text>
  <text x="1080" y="135" class="stage-sub">Reporting</text>

  <!-- Stage 1 - FRR routers (top left) -->
  <rect x="50" y="160" width="150" height="60" rx="4" class="frr-box"/>
  <text x="125" y="180" class="box-title">FRR Routers</text>
  <text x="125" y="196" class="box-mono">router1, router2, router3</text>
  <text x="125" y="210" class="box-mono">.101, .102, .103</text>

  <!-- Stage 1 - snmp-notifier -->
  <rect x="50" y="245" width="150" height="78" rx="4" class="ingest-box"/>
  <text x="125" y="263" class="box-title">snmp-notifier</text>
  <text x="125" y="278" class="box-mono">172.21.0.14</text>
  <text x="125" y="293" class="box-mono">snmp_listener.py</text>
  <text x="125" y="312" class="box-detail">UDP:162 - parse + normalise</text>

  <!-- Arrow: FRR -> snmp-notifier (orange, SNMP traps) -->
  <path d="M 125 220 L 125 245" class="arrow-orange"/>
  <text x="132" y="237" class="arrow-label" fill="#d97706">SNMP traps</text>

  <!-- Stage 2 - marr-receiver (with classifier and mattermost_notifier annotations) -->
  <rect x="280" y="245" width="180" height="155" rx="4" class="receiver-box"/>
  <text x="370" y="263" class="box-title">marr-receiver</text>
  <text x="370" y="277" class="box-detail">host-side systemd</text>
  <text x="370" y="292" class="box-mono">:5000/alert</text>
  <line x1="295" y1="305" x2="445" y2="305" stroke="#d97706" stroke-dasharray="2 2"/>
  <text x="370" y="320" class="annot-text">imports classifier</text>
  <text x="370" y="333" class="annot-text">(YAML rulesets:</text>
  <text x="370" y="346" class="annot-text">linkDown, OSPF, BGP)</text>
  <text x="370" y="365" class="annot-text">imports mattermost_notifier</text>
  <text x="370" y="380" class="annot-text">(per-event report path)</text>
  <text x="370" y="394" class="annot-text">imports run_playbook</text>

  <!-- Arrow: snmp-notifier -> marr-receiver (orange, HTTP POST) -->
  <path d="M 200 285 L 280 285" class="arrow-orange"/>
  <text x="217" y="278" class="arrow-label" fill="#d97706">HTTP POST</text>

  <!-- Stage 2 - marr-kafka -->
  <rect x="280" y="160" width="180" height="60" rx="4" class="kafka-box"/>
  <text x="370" y="178" class="box-title">marr-kafka</text>
  <text x="370" y="192" class="box-mono">localhost:9092</text>
  <text x="370" y="208" class="box-mono">raw.alerts / snmp.traps / syslog.events</text>

  <!-- Arrow: receiver -> kafka (blue, publish) -->
  <path d="M 370 245 L 370 220" class="arrow-blue"/>
  <text x="377" y="237" class="arrow-label" fill="#1d4ed8">publish</text>

  <!-- Stage 3 - marr-correlator (with mattermost_notifier annotation) -->
  <rect x="540" y="160" width="170" height="115" rx="4" class="correlator-box"/>
  <text x="625" y="178" class="box-title">marr-correlator</text>
  <text x="625" y="192" class="box-detail">host-side systemd</text>
  <text x="625" y="208" class="box-mono">source-key + ifIndex</text>
  <text x="625" y="222" class="box-mono">windowed grouping</text>
  <text x="625" y="236" class="box-mono">idempotency marker</text>
  <text x="625" y="254" class="annot-text">imports mattermost_notifier</text>
  <text x="625" y="266" class="annot-text">(grouped report path)</text>

  <!-- Arrow: kafka -> correlator (blue, consume) -->
  <path d="M 460 195 L 540 195" class="arrow-blue"/>
  <text x="465" y="188" class="arrow-label" fill="#1d4ed8">consume topics</text>

  <!-- Stage 3 - marr-redis -->
  <rect x="540" y="305" width="170" height="95" rx="4" class="redis-box"/>
  <text x="625" y="323" class="box-title">marr-redis</text>
  <text x="625" y="337" class="box-mono">localhost:6380</text>
  <text x="625" y="354" class="box-detail">windows / leases</text>
  <text x="625" y="370" class="box-detail">diag context (4KB / 5min)</text>
  <text x="625" y="388" class="box-detail">at-least-once delivery</text>

  <!-- Arrow: correlator <-> redis (purple, lease) -->
  <path d="M 600 275 L 600 305" class="arrow-purple"/>
  <text x="555" y="293" class="arrow-label" fill="#7e22ce">lease</text>

  <!-- Arrow: receiver -> redis (purple, write diag context) -->
  <path d="M 460 350 L 540 350" class="arrow-purple"/>
  <text x="465" y="343" class="arrow-label" fill="#7e22ce">window R/W</text>

  <!-- Arrow: receiver -> redis (dashed, suppression check) -->
  <path d="M 460 380 L 540 380" class="arrow-dashed"/>
  <text x="465" y="373" class="arrow-label">suppression check</text>

  <!-- Stage 4 - Ansible runbook executor -->
  <rect x="790" y="245" width="170" height="95" rx="4" class="ansible-box"/>
  <text x="875" y="263" class="box-title">Ansible</text>
  <text x="875" y="278" class="box-detail">runbook executor</text>
  <text x="875" y="295" class="box-mono">community.docker.</text>
  <text x="875" y="308" class="box-mono">docker_container_exec</text>
  <text x="875" y="325" class="box-detail">read-only allowlist</text>

  <!-- Arrow: receiver -> ansible (green, execute playbook) -->
  <path d="M 460 290 L 790 290" class="arrow-green"/>
  <text x="540" y="283" class="arrow-label" fill="#15803d">execute playbook</text>

  <!-- Stage 4 - FRR vtysh -->
  <rect x="790" y="365" width="170" height="95" rx="4" class="frr-vtysh-box"/>
  <text x="875" y="383" class="box-title">FRR vtysh</text>
  <text x="875" y="399" class="box-detail">show interface</text>
  <text x="875" y="413" class="box-detail">show ip ospf neighbor</text>
  <text x="875" y="427" class="box-detail">show ip bgp summary</text>
  <text x="875" y="442" class="box-detail">show ip route</text>

  <!-- Arrow: ansible -> vtysh (green) -->
  <path d="M 875 340 L 875 365" class="arrow-green"/>

  <!-- Stage 5 - marr-mattermost -->
  <rect x="1010" y="245" width="200" height="100" rx="4" class="mattermost-box"/>
  <text x="1110" y="263" class="box-title">marr-mattermost</text>
  <text x="1110" y="278" class="box-mono">172.21.0.31:8065</text>
  <text x="1110" y="294" class="box-detail">webhook</text>
  <text x="1110" y="310" class="box-detail">network-alerts channel</text>
  <text x="1110" y="326" class="box-detail">single delivery surface</text>

  <!-- Arrow: receiver -> mattermost (pink, per-event report) -->
  <path d="M 460 380 C 700 460, 950 440, 1080 345" class="arrow-pink"/>
  <text x="700" y="475" class="arrow-label-c" fill="#be185d">per-event report (if not suppressed)</text>

  <!-- Arrow: correlator -> mattermost (pink, grouped report) -->
  <path d="M 710 195 C 900 195, 1010 220, 1080 245" class="arrow-pink"/>
  <text x="855" y="190" class="arrow-label-c" fill="#be185d">grouped (correlated) report</text>

  <!-- OpenNMS sub-stack -->
  <rect x="50" y="490" width="1180" height="90" rx="4" class="opennms-box"/>
  <text x="62" y="510" class="plane-label" font-size="12">OpenNMS sub-stack</text>

  <rect x="65" y="520" width="200" height="50" rx="3" class="opennms-box"/>
  <text x="165" y="538" class="box-title">OpenNMS Horizon</text>
  <text x="165" y="554" class="box-mono">172.21.0.11:8980</text>
  <text x="165" y="567" class="box-detail">v33.0.2 - ActiveMQ broker</text>

  <rect x="285" y="520" width="180" height="50" rx="3" class="opennms-box"/>
  <text x="375" y="538" class="box-title">chongjin-minion-01</text>
  <text x="375" y="554" class="box-mono">172.21.0.21</text>
  <text x="375" y="567" class="box-detail">location: Solent-1</text>

  <rect x="485" y="520" width="180" height="50" rx="3" class="opennms-box"/>
  <text x="575" y="538" class="box-title">hamhung-minion-01</text>
  <text x="575" y="554" class="box-mono">172.21.0.20</text>
  <text x="575" y="567" class="box-detail">location: Solent-2</text>

  <rect x="685" y="520" width="540" height="50" rx="3" class="opennms-box"/>
  <text x="955" y="538" class="box-title">OpenNMS is on the operational plane but off the live triage path</text>
  <text x="955" y="554" class="box-detail">Receives the same traps for cross-tool semantic compatibility (UEI vocabulary).</text>
  <text x="955" y="567" class="box-detail">MARR's correlator and reporter consume from Kafka, not from OpenNMS events.</text>

  <text x="375" y="588" class="note-text" text-anchor="middle">ActiveMQ heartbeat (registration, status)</text>

  <!-- ===== Reporting plane ===== -->
  <rect x="20" y="615" width="1260" height="120" rx="6" class="plane-reporting"/>
  <text x="32" y="635" class="plane-label">marr-reporting - Observability plane</text>
  <text x="32" y="650" class="plane-cidr">172.22.0.0/24</text>

  <rect x="50" y="665" width="170" height="55" rx="4" class="opennms-box"/>
  <text x="135" y="683" class="box-title">Prometheus</text>
  <text x="135" y="697" class="box-mono">:9090</text>
  <text x="135" y="712" class="box-detail">platform telemetry</text>

  <rect x="240" y="665" width="170" height="55" rx="4" class="opennms-box"/>
  <text x="325" y="683" class="box-title">Grafana</text>
  <text x="325" y="697" class="box-mono">:3000</text>
  <text x="325" y="712" class="box-detail">platform dashboards</text>

  <rect x="430" y="665" width="170" height="55" rx="4" class="opennms-box"/>
  <text x="515" y="683" class="box-title">HashiCorp Vault</text>
  <text x="515" y="697" class="box-mono">:8200</text>
  <text x="515" y="712" class="box-detail">credential management</text>

  <rect x="620" y="665" width="610" height="55" rx="4" class="legend-box"/>
  <text x="925" y="683" class="box-detail">marr-reporting plane carries platform observability, not alert data</text>
  <text x="925" y="697" class="box-detail">Operational alert data flows through marr-net (above).</text>
  <text x="925" y="711" class="box-detail">marr-reporting holds Prometheus, Grafana, Vault, and Kafka/Redis volumes.</text>

  <!-- ===== Legend ===== -->
  <rect x="20" y="750" width="1260" height="120" rx="6" class="legend-box"/>
  <text x="32" y="772" class="plane-label">Legend</text>

  <line x1="120" y1="790" x2="160" y2="790" class="arrow-orange"/>
  <text x="170" y="794" class="legend-text">SNMP / HTTP ingestion</text>

  <line x1="320" y1="790" x2="360" y2="790" class="arrow-blue"/>
  <text x="370" y="794" class="legend-text">Kafka publish / consume</text>

  <line x1="540" y1="790" x2="580" y2="790" class="arrow-purple"/>
  <text x="590" y="794" class="legend-text">Redis state (correlator)</text>

  <line x1="760" y1="790" x2="800" y2="790" class="arrow-green"/>
  <text x="810" y="794" class="legend-text">Ansible diagnostic execution</text>

  <line x1="1010" y1="790" x2="1050" y2="790" class="arrow-pink"/>
  <text x="1060" y="794" class="legend-text">Mattermost report delivery</text>

  <line x1="120" y1="815" x2="160" y2="815" class="arrow-dashed"/>
  <text x="170" y="819" class="legend-text">Control / heartbeat / suppression check</text>

  <text x="32" y="844" class="note-text">Notes:</text>
  <text x="80" y="844" class="note-text">Stage colour codes match component fill above. Real component names from v4.0 lab; addresses verified 3 May 2026.</text>
  <text x="80" y="858" class="note-text">marr-receiver, marr-correlator, marr-syslog and marr-snmp run as host-side systemd services; all other MARR components run as Docker containers.</text>
  <text x="80" y="869" class="note-text">classifier, run_playbook and mattermost_notifier are Python modules imported by the receiver and correlator processes, not separate daemons.</text>

</svg>
