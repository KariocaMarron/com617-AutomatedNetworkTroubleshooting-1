  <text x="135" y="305" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">172.21.0.14</text>
  <text x="135" y="323" font-size="11" text-anchor="middle">snmp_listener.py</text>
  <text x="135" y="338" font-size="9" text-anchor="middle" fill="#555">UDP:162  -  parse + normalise</text>

