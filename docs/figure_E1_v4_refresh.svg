  <rect x="990" y="180" width="200" height="90" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5" rx="4"/>
  <text x="1090" y="201" font-size="12" font-weight="bold" text-anchor="middle">marr-mattermost</text>
  <text x="1090" y="217" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">172.21.0.31:8065</text>
  <text x="1090" y="237" font-size="11" text-anchor="middle">webhook</text>
  <text x="1090" y="253" font-size="9" text-anchor="middle" fill="#555">network-alerts channel</text>
  <text x="1090" y="265" font-size="9" text-anchor="middle" fill="#555">single delivery surface</text>

