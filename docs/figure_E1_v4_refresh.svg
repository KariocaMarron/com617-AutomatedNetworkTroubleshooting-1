  <text x="835" y="328" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#444">show interface</text>
  <text x="835" y="343" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#444">show ip bgp summary</text>
  <text x="835" y="358" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#444">show ip route</text>

