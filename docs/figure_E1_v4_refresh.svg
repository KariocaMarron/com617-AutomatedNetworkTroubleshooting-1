  <text x="135" y="400" font-size="12" font-weight="bold" text-anchor="middle">marr-receiver</text>
  <text x="135" y="415" font-size="10" text-anchor="middle" fill="#444">host-side systemd</text>
  <text x="135" y="431" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">:5000/alert</text>

