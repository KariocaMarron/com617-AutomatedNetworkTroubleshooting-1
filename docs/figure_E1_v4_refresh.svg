  <rect x="520" y="180" width="160" height="20" fill="#6a1b9a" rx="4"/>
  <text x="600" y="195" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">v4.0 ACTIVE</text>
  <text x="600" y="221" font-size="12" font-weight="bold" text-anchor="middle">marr-correlator</text>
  <text x="600" y="237" font-size="10" text-anchor="middle" fill="#444">host-side systemd</text>
  <text x="600" y="252" font-size="9" text-anchor="middle" fill="#555">window/lease/group</text>
  <text x="600" y="265" font-size="9" text-anchor="middle" fill="#555">source-key + ifIndex</text>
