  <text x="615" y="710" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">:8200</text>
  <text x="615" y="722" font-size="9" text-anchor="middle" fill="#555">credential management</text>

  <rect x="745" y="675" width="445" height="55" fill="#fff" stroke="#888" stroke-width="1.2" rx="4" stroke-dasharray="4 3"/>
  <text x="967" y="695" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">marr-reporting plane carries platform observability, not alert data</text>
  <text x="967" y="711" font-size="9" text-anchor="middle" fill="#555">Operational alert data flows through marr-net (above).</text>
  <text x="967" y="725" font-size="9" text-anchor="middle" fill="#555">marr-reporting holds Prometheus, Grafana, Vault, and Kafka/Redis volumes.</text>

