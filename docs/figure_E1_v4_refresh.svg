  <!-- Title corridor -->
  <text x="650" y="30" font-size="22" font-weight="bold" text-anchor="middle">MARR System Architecture - v4.0 Lab</text>
  <text x="650" y="52" font-size="13" text-anchor="middle" fill="#555">Five-stage pipeline with decoupled correlator. Updated 4 May 2026 with renamed minion locations and confirmed correlator deployment.</text>

  <!-- marr-net plane -->
  <rect x="20" y="70" width="1260" height="540" fill="#f5f5f5" stroke="#bbb" stroke-width="1" rx="6"/>
  <text x="40" y="93" font-size="13" font-weight="bold" fill="#333">marr-net  -  Operational monitoring plane</text>
  <text x="40" y="110" font-size="11" font-family="Courier New, monospace" fill="#555">172.21.0.0/16</text>

  <!-- marr-reporting plane -->
  <rect x="20" y="620" width="1260" height="120" fill="#f0f4f7" stroke="#bbb" stroke-width="1" rx="6"/>
  <text x="40" y="643" font-size="13" font-weight="bold" fill="#333">marr-reporting  -  Observability plane</text>
  <text x="40" y="660" font-size="11" font-family="Courier New, monospace" fill="#555">172.22.0.0/24</text>

  <!-- Stage labels -->
  <text x="135" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#444">Stage 1</text>
  <text x="135" y="156" font-size="11" text-anchor="middle" fill="#666">Ingestion</text>
  <text x="365" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#444">Stage 2</text>
  <text x="365" y="156" font-size="11" text-anchor="middle" fill="#666">Categorisation</text>
  <text x="600" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#444">Stage 3</text>
  <text x="600" y="156" font-size="11" text-anchor="middle" fill="#666">Correlation</text>
  <text x="835" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#444">Stage 4</text>
  <text x="835" y="156" font-size="11" text-anchor="middle" fill="#666">Diagnostics</text>
  <text x="1085" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#444">Stage 5</text>
  <text x="1085" y="156" font-size="11" text-anchor="middle" fill="#666">Reporting</text>

  <!-- Routers -->
  <rect x="55" y="180" width="160" height="60" fill="#e8e8e8" stroke="#666" stroke-width="1.2" rx="4"/>
  <text x="135" y="203" font-size="12" font-weight="bold" text-anchor="middle">FRR Routers</text>
  <text x="135" y="219" font-size="10" text-anchor="middle" fill="#555">router1, router2, router3</text>
  <text x="135" y="233" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">.101 .102 .103</text>

  <!-- snmp-notifier -->
  <rect x="55" y="270" width="160" height="80" fill="#fff3e0" stroke="#cc6600" stroke-width="1.5" rx="4"/>
