  <text x="365" y="217" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">localhost:9092</text>
  <text x="365" y="244" font-size="10" text-anchor="middle" fill="#555">Topics:</text>
  <text x="365" y="263" font-size="11" font-family="Courier New, monospace" text-anchor="middle" fill="#222">raw.alerts</text>
