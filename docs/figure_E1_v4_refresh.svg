  <text x="40" y="861" font-size="10" font-weight="bold" fill="#444">v4.0 changes from earlier diagrams:</text>
  <text x="40" y="877" font-size="9" fill="#444">- marr-correlator and marr-redis are now first-class components on the live triage path (purple, "v4.0 ACTIVE" badge).</text>
