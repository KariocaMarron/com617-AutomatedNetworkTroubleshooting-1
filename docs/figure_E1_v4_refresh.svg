  <text x="385" y="535" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">172.21.0.21</text>
  <text x="385" y="550" font-size="10" text-anchor="middle" fill="#2e7d32" font-weight="bold">location: Solent-1</text>

  <rect x="515" y="500" width="200" height="65" fill="#fff" stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="615" y="520" font-size="12" font-weight="bold" text-anchor="middle">hamhung-minion-01</text>
  <text x="615" y="535" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">172.21.0.20</text>
  <text x="615" y="550" font-size="10" text-anchor="middle" fill="#2e7d32" font-weight="bold">location: Solent-2</text>

  <!-- OpenNMS observational note -->
  <rect x="745" y="500" width="445" height="65" fill="#fff" stroke="#888" stroke-width="1.2" rx="4" stroke-dasharray="4 3"/>
  <text x="967" y="522" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">OpenNMS is on the operational plane but off the live triage path</text>
  <text x="967" y="540" font-size="9" text-anchor="middle" fill="#555">Receives the same traps for cross-tool semantic compatibility (UEI vocabulary).</text>
  <text x="967" y="555" font-size="9" text-anchor="middle" fill="#555">MARR's correlator and reporter consume from Kafka, not OpenNMS events.</text>

  <!-- Observability plane -->
  <rect x="55" y="675" width="200" height="55" fill="#fff" stroke="#888" stroke-width="1.2" rx="4"/>
  <text x="155" y="695" font-size="12" font-weight="bold" text-anchor="middle">Prometheus</text>
  <text x="155" y="710" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">:9090</text>
  <text x="155" y="722" font-size="9" text-anchor="middle" fill="#555">platform telemetry</text>

  <rect x="285" y="675" width="200" height="55" fill="#fff" stroke="#888" stroke-width="1.2" rx="4"/>
  <text x="385" y="695" font-size="12" font-weight="bold" text-anchor="middle">Grafana</text>
  <text x="385" y="710" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">:3000</text>
  <text x="385" y="722" font-size="9" text-anchor="middle" fill="#555">platform dashboards</text>

  <rect x="515" y="675" width="200" height="55" fill="#fff" stroke="#888" stroke-width="1.2" rx="4"/>
