  <text x="40" y="490" font-size="11" font-weight="bold" fill="#333">OpenNMS sub-stack:</text>

  <rect x="55" y="500" width="200" height="65" fill="#fff" stroke="#888" stroke-width="1.2" rx="4"/>
  <text x="155" y="520" font-size="12" font-weight="bold" text-anchor="middle">OpenNMS Horizon</text>
  <text x="155" y="535" font-size="9" font-family="Courier New, monospace" text-anchor="middle" fill="#666">172.21.0.11:8980</text>
  <text x="155" y="550" font-size="9" text-anchor="middle" fill="#555">v33.0.2  -  ActiveMQ broker</text>

