  <text x="835" y="236" font-size="9" text-anchor="middle" fill="#555">community.docker</text>
  <text x="835" y="250" font-size="9" text-anchor="middle" fill="#555">.docker_container_exec</text>
  <text x="835" y="264" font-size="9" text-anchor="middle" fill="#555">read-only allowlist</text>

