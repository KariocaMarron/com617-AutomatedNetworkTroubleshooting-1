---
- name: BGP Diagnostic
  hosts: localhost
  gather_facts: false
  vars:
    report_dir: /home/cyber/Solent_Final_Lab/reports
    fault: "{{ fault | default('bgp-change') }}"
    target: "{{ target | default('unknown') }}"
    routers:
      - clab-marr-lab-router1
      - clab-marr-lab-router2
      - clab-marr-lab-router3

  tasks:
    - name: Get BGP summary from all routers
      command: docker exec {{ item }} vtysh -c "show bgp summary"
      register: bgp_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get BGP neighbours from all routers
      command: docker exec {{ item }} vtysh -c "show bgp neighbors"
      register: bgp_nb
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get BGP routes from all routers
      command: docker exec {{ item }} vtysh -c "show bgp ipv4 unicast"
      register: bgp_routes
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Get IP routing table from all routers
      command: docker exec {{ item }} vtysh -c "show ip route bgp"
      register: route_out
      ignore_errors: true
      loop: "{{ routers }}"

    - name: Save diagnostic results to JSON
      copy:
        content: "{{ {
          'playbook': 'diagnose-bgp',
          'fault': fault,
          'target': target,
          'bgp_summary': bgp_out.results | map(attribute='stdout') | list,
          'bgp_neighbors': bgp_nb.results | map(attribute='stdout') | list,
          'bgp_routes': bgp_routes.results | map(attribute='stdout') | list,
          'ip_routes': route_out.results | map(attribute='stdout') | list
          } | to_nice_json }}"
        dest: "{{ report_dir }}/diag-bgp-{{ lookup('pipe', 'date +%s') }}.json"
